<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" fill="#10130B"/>
  <rect x="36" y="36" width="1528" height="828" rx="24" fill="#1A2113" stroke="#3C4C2A"/>
