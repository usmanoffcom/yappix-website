# CORS для Next.js assetPrefix (HTML с yappix.ru → статика с cdn.yappix.ru).
# Без этих заголовков: ChunkLoadError, шрифты net::ERR_FAILED, React #423.
#
# Вставьте в server { } для server_name cdn.yappix.ru; (или включите через include).
# После reload nginx можно собирать с NEXT_PUBLIC_CDN_URL=https://cdn.yappix.ru

location /_next/static/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Обязательно для кросс-доменной загрузки шрифтов и чанков
    add_header Access-Control-Allow-Origin "https://yappix.ru" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Vary "Origin" always;

    add_header Cache-Control "public, max-age=31536000, immutable";
}

# Cloudflare без nginx: правило «Transform Rules» → Response header
# Access-Control-Allow-Origin = https://yappix.ru
# для Host = cdn.yappix.ru и URI Path starts with /_next/static/
