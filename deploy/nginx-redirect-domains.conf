# Редирект yappix.net и yappix.studio на yappix.ru
# Добавить на сервере: скопировать в /etc/nginx/sites-available/ или включить в конфиг основного сайта.

# yappix.net → yappix.ru
server {
    listen 80;
    listen [::]:80;
    server_name yappix.net www.yappix.net;
    return 301 https://yappix.ru$request_uri;
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yappix.net www.yappix.net;
    # ssl_certificate и ssl_certificate_key — если есть сертификаты для yappix.net
    return 301 https://yappix.ru$request_uri;
}

# yappix.studio → yappix.ru
server {
    listen 80;
    listen [::]:80;
    server_name yappix.studio www.yappix.studio;
    return 301 https://yappix.ru$request_uri;
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yappix.studio www.yappix.studio;
    # ssl_certificate и ssl_certificate_key — если есть сертификаты для yappix.studio
    return 301 https://yappix.ru$request_uri;
}
