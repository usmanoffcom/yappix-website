# Кросс-доменный assetPrefix (cdn.yappix.ru): см. deploy/nginx-cdn-cors.conf — иначе CORS на шрифтах/чанках.
#
# location / (основной прокси на Node): если HTML «обрывается» на ~20 KB у части клиентов через Cloudflare,
# включите буферизацию ответа от upstream и достаточные таймауты (подставьте в свой server { } для yappix.ru):
#
#   location / {
#       proxy_pass http://127.0.0.1:3001;
#       proxy_http_version 1.1;
#       proxy_set_header Host $host;
#       proxy_set_header X-Real-IP $remote_addr;
#       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#       proxy_set_header Upgrade $http_upgrade;
#       proxy_set_header Connection "";
#       proxy_read_timeout 120s;
#       proxy_send_timeout 120s;
#       proxy_buffering on;
#       proxy_buffers 16 128k;
#       proxy_busy_buffers_size 256k;
#       proxy_max_temp_file_size 0;
#   }
#
# После правок: nginx -t && systemctl reload nginx. В Cloudflare: Caching → Purge Everything.

# Сниппет для nginx: раздача _next/static через proxy (как было до правок).
# Чанки с путём app/kejsy/[slug]/ в Next.js могут отдавать 404 — это известный баг Next.js.
# Не менять на alias без проверки: разлом всего сайта.

# /LLMs.txt и др. варианты регистра: отдать как /llms.txt (иначе nginx может отдать 404 до Next/middleware).
# Вставить в server { } выше общего location /, если смешанный регистр даёт 404.
location ~* ^/llms\.txt$ {
    proxy_pass http://127.0.0.1:3001/llms.txt;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /_next/static/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # CORS для Selectel CDN (cdn.yappix.ru) — HTML с yappix.ru тянет статику с cdn.*
    add_header Access-Control-Allow-Origin "https://yappix.ru" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Vary "Origin" always;
    add_header Timing-Allow-Origin "*" always;

    add_header Cache-Control "public, max-age=31536000, immutable" always;
}
