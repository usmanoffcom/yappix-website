# Кросс-доменный assetPrefix (cdn.yappix.ru): см. deploy/nginx-cdn-cors.conf — иначе CORS на шрифтах/чанках.
#
# Сниппет для nginx: раздача _next/static через proxy (как было до правок).
# Чанки с путём app/kejsy/[slug]/ в Next.js могут отдавать 404 — это известный баг Next.js.
# Не менять на alias без проверки: разлом всего сайта.

# /LLMs.txt и др. варианты регистра: отдать как /llms.txt (иначе nginx может отдать 404 до Next/middleware).
# Вставить в server { } выше общего location /, если смешанный регистр даёт 404.
location ~* ^/llms\.txt$ {
    proxy_pass http://127.0.0.1:3001/llms.txt;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /_next/static/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=31536000, immutable";
}
