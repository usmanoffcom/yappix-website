# Сниппет для nginx: раздача _next/static через proxy (как было до правок).
# Чанки с путём app/kejsy/[slug]/ в Next.js могут отдавать 404 — это известный баг Next.js.
# Не менять на alias без проверки: разлом всего сайта.

location /_next/static/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=31536000, immutable";
}
