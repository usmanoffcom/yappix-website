# Кэш nginx для Next.js Image Optimization (`/_next/image?...`).
# Снимает повторную нагрузку с Node (ресайз/WebP на каждый запрос).
#
# 1) Один раз в блоке `http { }` основного nginx.conf:
#
#    proxy_cache_path /var/cache/nginx/next_image levels=1:2 keys_zone=next_image:30m
#                     max_size=2g inactive=60d use_temp_path=off;
#
# 2) В `server { }` для yappix.ru (рядом с `location /`) включите этот файл или скопируйте location:
#
#    include /var/www/yappix.ru/deploy/nginx-next-image-cache.conf;
#
# 3) mkdir -p /var/cache/nginx/next_image && chown -R www-data:www-data /var/cache/nginx/next_image
#    (или пользователя, от которого работает nginx)
#
# 4) nginx -t && systemctl reload nginx

location /_next/image {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_cache next_image;
    proxy_cache_valid 200 60d;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    add_header X-Next-Image-Cache $upstream_cache_status always;
}
