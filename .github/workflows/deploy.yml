# Production: только вручную (кнопка Run workflow) или с сервера: cd /var/www/yappix.ru && git fetch && git reset --hard origin/main && bash scripts/deploy.sh
# Автодеплой по push в main отключён — деплойте сами, когда нужно.
name: Deploy to production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-yappix
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            set -euo pipefail
            cd /var/www/yappix.ru
            # Сначала подтянуть репозиторий — на сервере должен быть актуальный scripts/deploy.sh
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy.sh
